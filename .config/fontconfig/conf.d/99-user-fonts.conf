<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- User font configuration - merged from fonts.conf and conf.d/99-user-fonts.conf -->
  <!-- This file is named 99-* to ensure it loads after 60-latin.conf which -->
  <!-- sets Noto Sans/Serif/Mono as defaults in fontconfig 2.18+ -->

  <!-- Font family preferences -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Maple Mono NF CN</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Maple Mono NF CN</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono NF CN</family>
    </prefer>
  </alias>

  <!-- Font rendering settings -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
</fontconfig>
